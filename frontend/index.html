<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azure DevOps Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <div class="header-left">
                <h1>Azure DevOps Dashboard</h1>
                <p class="project-name">Cloud Reboot AI Tiger Team</p>
            </div>
            <div class="header-right">
                <span id="last-updated"></span>
                <button id="refresh-btn" onclick="fetchWorkItems()">Refresh</button>
            </div>
        </header>

        <div id="error-banner" class="error-banner hidden"></div>

        <div id="loading" class="loading hidden">
            <div class="spinner"></div>
            <span>Fetching work items...</span>
        </div>

        <div id="raw-data" class="raw-data hidden">
            <div class="raw-header">
                <span id="item-count"></span>
                <span class="raw-label">Raw JSON Response</span>
            </div>
            <pre id="json-output"></pre>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
